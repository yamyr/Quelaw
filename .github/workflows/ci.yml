name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.14
        uses: actions/setup-python@v7
        with:
          python-version: "3.14"

      - name: Install test tooling
        run: python -m pip install --upgrade pip pytest

      - name: Byte-compile all modules
        run: python -m py_compile app.py scripts/ingest.py scripts/check_demo.py scripts/check_demo_scenarios.py quelaw/*.py

      - name: Run tests
        # Runs in offline heuristic mode (no ChromaDB / API key) so it is
        # deterministic. Heavy deps are intentionally not installed here.
        run: python -m pytest -q
